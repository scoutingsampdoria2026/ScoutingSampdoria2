name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configura Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Rigenera Gradle Wrapper se manca
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.9
          elif [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      - name: Costruisci APK debug (firmato con debug keystore Android)
        run: ./gradlew assembleDebug --no-daemon --stacktrace -PversionNameOverride=${{ github.run_number }}

      - name: Rinomina APK con numero release
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/ScoutingSampdoria2-v${{ github.run_number }}-debug.apk

      - name: Carica APK come artefatto scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: ScoutingSampdoria2-v${{ github.run_number }}-debug
          path: artifacts/ScoutingSampdoria2-v${{ github.run_number }}-debug.apk
          retention-days: 30
