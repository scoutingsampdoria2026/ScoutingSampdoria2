name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configura Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Rigenera Gradle Wrapper se manca
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.9
          elif [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      - name: Decodifica keystore dai Secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/scouting2-release.jks
          ls -la app/scouting2-release.jks

      - name: Costruisci APK release firmato
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace -PversionNameOverride=${{ github.run_number }}

      - name: Rinomina APK con numero release
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk artifacts/ScoutingSampdoria2-v${{ github.run_number }}.apk

      - name: Carica APK come artefatto scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: ScoutingSampdoria2-v${{ github.run_number }}
          path: artifacts/ScoutingSampdoria2-v${{ github.run_number }}.apk
          retention-days: 30
